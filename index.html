<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClipForge Downloader</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Video downloader">
        <header class="topbar">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M5 5.5A2.5 2.5 0 0 1 7.5 3h9A2.5 2.5 0 0 1 19 5.5v13a2.5 2.5 0 0 1-2.5 2.5h-9A2.5 2.5 0 0 1 5 18.5v-13Z" />
                <path d="m10 8 5 4-5 4V8Z" />
              </svg>
            </span>
            <div>
              <h1>ClipForge</h1>
              <p>yt-dlp video downloader</p>
            </div>
          </div>
          <div class="system-pills" aria-label="System status">
            <span id="ytStatus" class="pill">yt-dlp</span>
            <span id="ffmpegStatus" class="pill">FFmpeg</span>
          </div>
        </header>

        <div id="dropZone" class="download-panel">
          <form id="fetchForm" class="url-form">
            <label for="videoUrl">Video URL</label>
            <div class="input-action">
              <input
                id="videoUrl"
                name="videoUrl"
                type="url"
                placeholder="https://www.youtube.com/watch?v=..."
                autocomplete="off"
                spellcheck="false"
                required
              />
              <button id="fetchButton" class="button button-primary" type="submit">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                  <path d="M21 3v6h-6" />
                </svg>
                <span>Fetch Video</span>
              </button>
            </div>
          </form>

          <div id="statusMessage" class="status-message" role="status" aria-live="polite">
            Ready for a supported video URL.
          </div>

          <section class="preview-layout" aria-label="Video details">
            <div class="thumbnail-frame">
              <img id="thumbnail" alt="" hidden />
              <div id="thumbnailEmpty" class="thumbnail-empty" aria-hidden="true">
                <svg viewBox="0 0 120 80" role="img">
                  <rect x="10" y="10" width="100" height="60" rx="8" />
                  <path d="M51 29 73 40 51 51Z" />
                  <path d="M18 63h84" />
                </svg>
              </div>
            </div>

            <div class="video-info">
              <div class="meta-row">
                <span id="platformBadge" class="badge">Awaiting URL</span>
                <span id="durationText" class="muted">Duration: --</span>
              </div>
              <h2 id="videoTitle">No video selected</h2>
              <p id="uploaderText" class="muted">Fetch metadata to choose quality and format.</p>

              <div class="selectors">
                <label>
                  <span>Quality</span>
                  <select id="qualitySelect" disabled>
                    <option value="">Fetch first</option>
                  </select>
                </label>
                <label>
                  <span>Format</span>
                  <select id="formatSelect" disabled>
                    <option value="">Fetch first</option>
                  </select>
                </label>
              </div>

              <div class="option-row">
                <label class="toggle">
                  <input id="playlistToggle" type="checkbox" />
                  <span>Playlist</span>
                </label>
                <label class="toggle">
                  <input id="subtitlesToggle" type="checkbox" />
                  <span>Subtitles</span>
                </label>
                <label class="toggle">
                  <input id="thumbnailToggle" type="checkbox" />
                  <span>Thumbnail</span>
                </label>
              </div>
            </div>
          </section>

          <section class="download-actions" aria-label="Download controls">
            <button id="downloadButton" class="button button-download" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 21h14" />
              </svg>
              <span>Download</span>
            </button>

            <div class="progress-wrap" aria-label="Download progress">
              <div class="progress-header">
                <span id="progressLabel">Idle</span>
                <span id="progressPercent">0%</span>
              </div>
              <div class="progress-track">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
              </div>
              <div class="progress-details">
                <span id="speedText">Speed: --</span>
                <span id="etaText">ETA: --</span>
              </div>
            </div>
          </section>

          <div id="resultArea" class="result-area" hidden></div>
        </div>
      </section>

      <aside class="side-panel" aria-label="Download history">
        <div class="metric-grid">
          <div>
            <span class="metric-value" id="qualityCount">0</span>
            <span class="metric-label">Qualities</span>
          </div>
          <div>
            <span class="metric-value" id="formatCount">0</span>
            <span class="metric-label">Formats</span>
          </div>
        </div>

        <section class="history-section">
          <div class="section-heading">
            <h2>History</h2>
            <button id="refreshHistory" class="icon-button" type="button" aria-label="Refresh history">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                <path d="M21 3v6h-6" />
              </svg>
            </button>
          </div>
          <div id="historyList" class="history-list">
            <p class="muted">No downloads yet.</p>
          </div>
        </section>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
